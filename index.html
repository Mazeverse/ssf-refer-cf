  <meta name="keywords" content="SSF샵 추천인, SSF샵 추천인코드, SSF샵 Goodcode, SSF샵 가입혜택" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Product",
    "name": "SSF샵 추천인 코드",
    "description": "SSF샵 가입 시 입력하는 추천인 코드입니다.",
    "brand": { "@type": "Brand", "name": "SSF샵" }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f7fc;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans KR", "Segoe UI", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .wrap {
      max-width: 800px;
      width: 100%;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 15px 45px rgba(0,0,0,0.08);
      overflow: hidden;
      display: flex;
      flex-direction: row; /* PC에서는 가로 배열 */
    }
    .left {
      flex: 1;
      padding: 50px 40px;
      background: linear-gradient(145deg, #1a2a44 0%, #1f3a5f 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .left .tag {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 20px;
      width: fit-content;
    }
    .left h1 {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 16px;
    }
    .left h1 span { color: #7fc9ff; }
    .left p {
      color: rgba(255,255,255,0.8);
      font-size: 16px;
      line-height: 1.7;
    }
    .right {
      flex: 1.2;
      padding: 50px 40px;
      background: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center; /* 내부 요소 가운데 정렬 */
      text-align: center;
    }
    .right .label {
      font-size: 13px;
      font-weight: 700;
      color: #1a2a44;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .voucher {
      width: 100%;
      background: #f8faff;
      border: 2px dashed #1a2a44;
      border-radius: 16px;
      padding: 30px 20px;
      margin-bottom: 24px;
      position: relative;
    }
    .voucher::before, .voucher::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: #fff; /* 카드 배경색과 동일하게 */
      border-radius: 50%;
      top: 50%;
      transform: translateY(-50%);
    }
    .voucher::before { left: -11px; border-right: 1px solid transparent; }
    .voucher::after { right: -11px; border-left: 1px solid transparent; }
    
    .voucher .code-display {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #1a2a44;
      font-family: "SF Mono", "Fira Code", monospace;
    }
    .voucher .sub {
      font-size: 14px;
      color: #667a99;
      margin-top: 8px;
    }
    .btn {
      width: 100%;
      max-width: 280px;
      padding: 16px 0;
      border: none;
      border-radius: 40px;
      background: #1a2a44;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.2s ease;
    }
    .btn:hover {
      background: #2a4a74;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(26,42,68,0.2);
    }
    .helper {
      font-size: 14px;
      color: #888e9a;
      margin-top: 20px;
      line-height: 1.6;
    }
    .helper strong { color: #1a2a44; }
    .foot {
      margin-top: 30px;
      font-size: 13px;
      color: #999;
      text-align: center;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1a2a44;
      color: #fff;
      padding: 12px 28px;
      border-radius: 50px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 9999;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    @media (max-width: 720px) {
      .wrap { flex-direction: column; }
      .left { padding: 40px 30px; text-align: center; align-items: center; }
      .right { padding: 40px 30px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="left">
      <div class="tag">SSF샵 추천인 안내</div>
      <h1>추천인 코드 <span>Goodcode</span><br>입력하고 혜택 받기</h1>
      <p>회원가입 시 추천인 코드를 입력하면<br>즉시 사용 가능한 포인트와<br>다양한 할인 혜택이 제공됩니다.</p>
    </section>
    <section class="right">
      <div class="label">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
        추천인 코드
      </div>
      <div class="voucher">
        <div class="code-display" id="refCode">Goodcode</div>
        <div class="sub">SSF SHOP REFERRAL CODE</div>
      </div>
      <button class="btn" id="copyBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        코드 복사하기
      </button>
      <p class="helper">
        <strong>SSF샵</strong> 가입 페이지 내<br>
        추천인 입력란에 위 코드를 입력하세요.
      </p>
    </section>
  </main>

  <footer class="foot">
    이 페이지는 SSF샵 추천인 코드 안내를 위한 정보 페이지입니다.
  </footer>

  <div id="toast" class="toast">✅ 코드가 복사되었습니다!</div>

  <script>
    (function() {
      var btn = document.getElementById('copyBtn');
      var code = 'Goodcode';
      var toast = document.getElementById('toast');
      btn.addEventListener('click', function() {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(code);
        } else {
          var ta = document.createElement('textarea');
          ta.value = code;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        toast.classList.add('show');
        clearTimeout(toast._t);
        toast._t = setTimeout(function() { toast.classList.remove('show'); }, 1600);
      });
    })();
  </script>
</body>
</html>
